<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年08月樂活學習講堂 - 線上報名與查詢系統</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --secondary-color: #81c784;
            --bg-color: #fafbf9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --muted-text: #718096;
            --border-color: #e2e8f0;
            --danger-color: #e53e3e;
            --warning-color: #dd6b20;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .header-banner {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .header-banner h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .header-banner p {
            margin: 10px 0 0 0;
            font-size: 15px;
            opacity: 0.9;
        }
        .container {
            max-width: 650px;
            margin: -20px auto 50px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        h2 {
            color: var(--primary-color);
            font-size: 20px;
            border-left: 5px solid var(--primary-color);
            padding-left: 10px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .section-divider {
            border-top: 2px dashed var(--border-color);
            margin: 40px 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4a5568;
            font-size: 15px;
        }
        input[type="text"], input[type="tel"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 125, 50, 0.15);
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .radio-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }
        .radio-label:hover:not(.disabled) {
            border-color: var(--primary-color);
            background-color: #f1f8f5;
        }
        .radio-label input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.1);
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-open { background-color: #e6fffa; color: #00a389; }
        .badge-full { background-color: #fffaf0; color: #dd6b20; }
        
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        
        /* Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .success { background-color: #f0fff4; border: 1px solid #c6f6d5; color: #22543d; }
        .error { background-color: #fff5f5; border: 1px solid #fed7d7; color: #742a2a; }
        
        .query-card {
            background-color: #f7fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .query-item {
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
        }
        .query-item:last-child { border-bottom: none; }
        
        /* 取消控制區區塊 */
        .cancel-box {
            background-color: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 6px;
            padding: 12px;
            margin-top: 12px;
            font-size: 13px;
        }
        .btn-cancel {
            background-color: var(--danger-color);
            padding: 8px 12px;
            font-size: 13px;
            margin-top: 10px;
            width: auto;
            display: inline-flex;
        }
        .btn-cancel:hover { background-color: #c53030; }
    </style>
</head>
<body>

<div class="header-banner">
    <h1>115年08月 樂活學習講堂</h1>
    <p>名額控管．安全驗證取消．自動遞補通知系統</p>
</div>

<div class="container">
    <h2>活動講堂線上報名表</h2>
    <form id="regForm">
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" required placeholder="請輸入您的真實姓名">
        </div>
        <div class="form-group">
            <label for="phone">手機號碼</label>
            <input type="tel" id="phone" required pattern="^09[0-9]{8}$" placeholder="請輸入手機號碼（格式：0912345678）">
        </div>
        <div class="form-group">
            <label for="email">電子信箱 (用於接收報名確認信與取消驗證)</label>
            <input type="email" id="email" required placeholder="請輸入您的電子信箱">
        </div>
        <div class="form-group">
            <label>請選擇報名梯次（額滿將自動開放候補）</label>
            <div class="radio-group" id="slotContainer">
                載入講堂場次狀態中...
            </div>
        </div>
        <button type="submit" id="submitBtn" disabled>
            <span class="spinner" id="submitSpinner"></span>
            <span>確認送出報名</span>
        </button>
        <div id="regResult" class="result-box"></div>
    </form>

    <div class="section-divider"></div>

    <h2>報名結果查詢與安全取消</h2>
    <div class="form-group">
        <label for="queryPhone">輸入手機號碼查詢</label>
        <input type="tel" id="queryPhone" placeholder="請輸入報名時填寫的手機號碼">
    </div>
    <button type="button" id="queryBtn" style="background-color: #4a5568;">
        <span class="spinner" id="querySpinner"></span>
        <span>開始查詢</span>
    </button>
    <div id="queryResult" class="result-box" style="background-color: #edf2f7; color: #2d3748; display:block;">輸入手機號碼以進行查詢。</div>
</div>

<script>
    // ⚠️ 務必在此處替換成您部署後獲得的 Google Apps Script 網頁應用程式 URL
    const API_URL = "https://script.google.com/macros/s/AKfycbyH-8Y5vVBzC-ANg5Gt-GqRbvg3ZvvuawF2km2LAmaPIXIRuuMEaK28KwW6a2WHKnLh/exec"; 

    // 1. 載入梯次與名額狀態
    async function loadSlotStatus() {
        try {
            const response = await fetch(`${API_URL}?action=getStatus`);
            const result = await response.json();
            
            if (result.success) {
                const slots = result.data;
                let html = '';
                
                Object.keys(slots).forEach(slotName => {
                    const info = slots[slotName];
                    
                    // 根據課程名稱對應海報中的細節資訊
                    let details = "";
                    if (slotName.includes("08.04")) details = "📍 210教室 | 講師: 林聰輝 | 材料費: 無 (請自備手機、Google帳密)";
                    else if (slotName.includes("08.07")) details = "📍 210教室 | 講師: 王惠麗 | 材料費: 無";
                    else if (slotName.includes("08.11")) details = "📍 210教室 | 講師: 邱侯玉蘭 | 材料費: $80/人";
                    else if (slotName.includes("08.14")) details = "📍 210教室 | 講師: 吳淑敏 | 材料費: 無";
                    else if (slotName.includes("08.18")) details = "📍 210教室 | 講師: 林世昌 | 材料費: 無";
                    else if (slotName.includes("08.21")) details = "📍 210教室 | 講師: 朱淑惠 | 材料費: $80/人";
                    else if (slotName.includes("08.25")) details = "📍 210教室 | 講師: 李蓮嬌 | 材料費: $150/人";
                    else if (slotName.includes("08.28")) details = "📍 210教室 | 講師: 陳美惠 | 材料費: $80/人";

                    if (info.isFull) {
                        // 額滿則標示候補
                        html += `
                            <label class="radio-label" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                                <div style="display: flex; justify-content: space-between; width: 100%;">
                                    <span><input type="radio" name="slot" value="${slotName}" required> <b>${slotName}</b></span>
                                    <span class="badge badge-full">❌ 已額滿 (開放候補中)</span>
                                </div>
                                <div style="font-size: 13px; color: #a0aec0; padding-left: 24px;">${details}</div>
                            </label>
                        `;
                    } else {
                        html += `
                            <label class="radio-label" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                                <div style="display: flex; justify-content: space-between; width: 100%;">
                                    <span><input type="radio" name="slot" value="${slotName}" required> <b>${slotName}</b></span>
                                    <span class="badge badge-open">餘額 ${info.max - info.current} 名 / 限額 ${info.max}人</span>
                                </div>
                                <div style="font-size: 13px; color: var(--muted-text); padding-left: 24px;">${details}</div>
                            </label>
                        `;
                    }
                });
                
                document.getElementById('slotContainer').innerHTML = html;
                document.getElementById('submitBtn').disabled = false;
            }
        } catch (error) {
            document.getElementById('slotContainer').innerHTML = '無法載入講堂狀態，請確認 Apps Script 已正確部署並開放所有人存取。';
            console.error(error);
        }
    }

    // 2. 報名資料送出
    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const submitSpinner = document.getElementById('submitSpinner');
        const regResult = document.getElementById('regResult');
        
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const selectedSlot = document.querySelector('input[name="slot"]:checked');
        
        if (!selectedSlot) {
            alert('請選擇一門課程！');
            return;
        }
        
        submitBtn.disabled = true;
        submitSpinner.style.display = 'inline-block';
        regResult.style.display = 'none';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: "register",
                    name: name, 
                    phone: phone, 
                    email: email,
                    slot: selectedSlot.value 
                })
            });

            regResult.className = 'result-box success';
            regResult.innerHTML = `🎉 <b>登記資料已成功送出！</b><br>系統正同步處理中。如果手機無重複報名，系統會在 1 分鐘內發送<b>報名/候補確認信</b>至您的信箱，請於下方輸入手機號碼查詢最終確認結果。`;
            regResult.style.display = 'block';
            
            setTimeout(loadSlotStatus, 1500);
            document.getElementById('regForm').reset();
            
        } catch (error) {
            regResult.className = 'result-box error';
            regResult.innerText = '連線發生錯誤，請稍候再試。';
            regResult.style.display = 'block';
        } finally {
            submitSpinner.style.display = 'none';
            submitBtn.disabled = false;
        }
    });

    // 3. 查詢報名狀態（含防重複/格式自動整理邏輯）
    document.getElementById('queryBtn').addEventListener('click', async () => {
        let phone = document.getElementById('queryPhone').value.replace(/[\s-]/g, '');
        const queryResult = document.getElementById('queryResult');
        const querySpinner = document.getElementById('querySpinner');
        
        document.getElementById('queryPhone').value = phone;
        
        if (!phone.match(/^09[0-9]{8}$/)) {
            alert('請輸入正確的手機號碼格式（10碼，例如：0912345678）！');
            return;
        }
        
        querySpinner.style.display = 'inline-block';
        document.getElementById('queryBtn').disabled = true;
        
        try {
            const response = await fetch(`${API_URL}?action=query&phone=${encodeURIComponent(phone)}`);
            const result = await response.json();
            
            if (result.success && result.data.length > 0) {
                let html = '<div style="font-weight:bold; margin-bottom:10px; color: var(--primary-color);">🔍 查到以下預約登記紀錄：</div>';
                result.data.forEach((item, index) => {
                    const statusText = item.isBackup ? '<span style="color:#dd6b20; font-weight:bold;">[候補中]</span>' : '<span style="color:#2f855a; font-weight:bold;">[報名成功]</span>';
                    html += `
                        <div class="query-card">
                            <div style="display:flex; justify-content:space-between;">
                                <b>📌 ${item.slot}</b> ${statusText}
                            </div>
                            <div style="font-size:13px; color:#4a5568; margin-top:5px;">
                                填答姓名：${item.name}<br>
                                登記時間：${item.time}
                            </div>
                            
                            <!-- 雙重驗證取消專區 -->
                            <div class="cancel-box" id="cancelBox_${index}">
                                <b>💡 需要取消此預約？</b><br>
                                <span style="color:#718096;">為保障您的權益，請輸入報名時留下的電子信箱：</span>
                                <input type="email" id="confirmEmail_${index}" placeholder="請輸入電子信箱" style="margin-top:8px; padding:6px 10px; font-size:13px;">
                                <button type="button" class="btn-cancel" onclick="cancelRegistration('${phone}', '${item.slot}', ${index})">驗證並取消預約</button>
                                <div id="cancelResult_${index}" style="margin-top:8px; display:none; font-weight:bold;"></div>
                            </div>
                        </div>
                    `;
                });
                queryResult.className = "result-box";
                queryResult.style.backgroundColor = "#fff";
                queryResult.innerHTML = html;
            } else {
                queryResult.className = "result-box error";
                queryResult.innerHTML = '❌ 查無此手機號碼的登記紀錄。請確認是否輸入正確或已取消。';
            }
        } catch (error) {
            queryResult.className = "result-box error";
            queryResult.innerText = '連線失敗，請檢查後端服務是否正常。';
            console.error(error);
        } finally {
            querySpinner.style.display = 'none';
            document.getElementById('queryBtn').disabled = false;
        }
    });

    // 4. 驗證信箱並取消報名
    async function cancelRegistration(phone, slot, index) {
        const emailInput = document.getElementById(`confirmEmail_${index}`).value.trim();
        const cancelResult = document.getElementById(`cancelResult_${index}`);
        
        if (!emailInput) {
            alert('請輸入電子信箱以進行身分驗證！');
            return;
        }
        
        if (!confirm(`您確定要取消「${slot}」的預約嗎？取消後名額將立即釋放給其他民眾。`)) {
            return;
        }
        
        cancelResult.style.display = 'block';
        cancelResult.style.color = '#4a5568';
        cancelResult.innerText = '驗證身分並處理取消中...';
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "cancel",
                    phone: phone,
                    email: emailInput,
                    slot: slot
                })
            });
            
            cancelResult.style.color = '#22543d';
            cancelResult.innerHTML = '已成功送出取消要求！請於 3 秒後重新查詢確認最新預約狀態。';
            
            setTimeout(loadSlotStatus, 1500);
            
        } catch (error) {
            cancelResult.style.color = '#742a2a';
            cancelResult.innerText = '取消時連線發生錯誤，請稍後再試。';
            console.error(error);
        }
    }

    // 初始化載入
    loadSlotStatus();
</script>

</body>
</html>
